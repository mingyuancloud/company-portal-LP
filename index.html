<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业集合后台管理系统</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ Login Page ═══ -->
<div id="loginPage" class="login-wrapper">
  <div class="login-card">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="22" height="18" rx="2"/><path d="M5 7h4M5 11h6M5 15h3M16 7h3M16 11h3M16 15h3"/></svg></div>
    <h1>企业集合管理</h1>
    <p class="sub">登录以查看和管理企业数据</p>
    <div class="login-field">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
    <p class="login-info">使用 Supabase 账号登录 | 首次使用请查看下方部署指南</p>
  </div>
</div>

<!-- ═══ App ═══ -->
<div id="appPage" class="app-wrap app-hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="side-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="22" height="18" rx="2"/><path d="M5 7h4M5 11h6M5 15h3M16 7h3M16 11h3M16 15h3"/></svg>企业集合管理</div>
    <nav class="side-nav">
      <div class="side-divider">Workspace</div>
      <div class="side-item active" data-page="dashboard" onclick="switchPage('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>企业总览</span>
      </div>
      <div class="side-item" data-page="users" onclick="switchPage('users')" id="navUsers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M21 10a3 3 0 0 0-6 0v8"/></svg>
        <span>用户管理</span>
      </div>
    </nav>
    <div class="side-footer">
      <div class="user-name" id="currentUser">admin</div>
      <div class="logout-btn" onclick="doLogout()">退出登录</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-area">

    <!-- Top Bar -->
    <header class="top-bar">
      <h2 id="pageTitle">企业总览</h2>
      <div class="top-search"><input type="text" id="searchInput" placeholder="搜索企业名称…" oninput="doSearch()"></div>
      <button class="btn btn-ghost btn-sm" onclick="downloadTemplate()">下载模板</button>
      <button class="btn btn-ghost btn-sm" onclick="showImport()">导入数据</button>
      <button class="btn btn-primary btn-sm" onclick="showCompanyForm()">添加企业</button>
    </header>

    <div class="content" id="contentArea"></div>

  </main>
</div>

<!-- ═══ Detail Panel ═══ -->
<div id="detailPanel" class="app-hidden"></div>

<!-- ═══ Modal Container ═══ -->
<div id="modalContainer"></div>

<!-- ═══ Toast ═══ -->
<div id="toastContainer"></div>

<!-- ═══ Confirm ═══ -->
<div id="confirmContainer"></div>

<!-- Supabase SDK — 多 CDN 容错加载 -->
<script>
(function loadSupabase(cdns, idx) {
  if (idx >= cdns.length) {
    // 全部 CDN 失败，显示错误
    document.getElementById('loginError').textContent = '网络加载失败，请刷新页面重试。若持续出现请检查网络连接。';
    document.querySelector('.login-btn').disabled = true;
    return;
  }
  var s = document.createElement('script');
  s.src = cdns[idx];
  s.onload = function() {
    // SDK 加载成功 → 加载 app.js
    var app = document.createElement('script');
    app.src = 'app.js';
    document.head.appendChild(app);
  };
  s.onerror = function() { loadSupabase(cdns, idx + 1); };
  document.head.appendChild(s);
})([
  'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js',
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
  'https://ga.jspm.io/npm:@supabase/supabase-js@2/dist/umd/supabase.min.js'
], 0);
</script>
